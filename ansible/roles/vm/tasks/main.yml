---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Podman
  ansible.builtin.apt:
    name:
      - podman
    state: present

# La VM no construye nada: solo autentica, hace pull y ejecuta la imagen publicada en ACR.
- name: Log in to Azure Container Registry from the VM
  containers.podman.podman_login:
    registry: "{{ acr_login_server }}"
    username: "{{ acr_username }}"
    password: "{{ acr_password }}"
  no_log: true

- name: Pull web server image from Azure Container Registry
  containers.podman.podman_image:
    name: "{{ acr_login_server }}/{{ web_image_name }}:{{ container_image_tag }}"
    state: present

- name: Run web server container with Podman
  containers.podman.podman_container:
    name: "{{ web_container_name }}"
    image: "{{ acr_login_server }}/{{ web_image_name }}:{{ container_image_tag }}"
    state: started
    recreate: true
    restart_policy: always
    ports:
      - "{{ web_container_port }}:80"
