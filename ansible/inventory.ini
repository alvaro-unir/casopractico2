# Exporta la clave privada generada por Terraform a ansible/private_key.pem antes de ejecutar los playbooks.
[webapp]
webserver ansible_host=158.158.40.232 ansible_user=azureuser ansible_ssh_private_key_file=private_key.pem ansible_python_interpreter=/usr/bin/python3

[acr]
localhost ansible_connection=local

[aks]
localhost ansible_connection=local

[all:vars]
# El tag comun deja claro que las imagenes pertenecen a este caso practico.
resource_group_name=rg-casopractico2
aks_name=aks-casopractico2
acr_name=acralvarocastrocasopractico2
acr_login_server=acralvarocastrocasopractico2.azurecr.io
vm_public_ip=158.158.40.232
container_image_tag=casopractico2
web_image_name=webserver
app_frontend_image_name=frontend
app_backend_image_name=backend
app_namespace=casopractico2
